<h1>Connexion</h1>

<form (ngSubmit)="seConnecter()">
  <div>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" [(ngModel)]="email" required />
  </div>

  <div>
    <label for="motDePasse">Mot de passe</label>
    <input id="motDePasse" name="motDePasse" type="password" [(ngModel)]="motDePasse" required />
  </div>

  @if (messageErreur) {
    <p class="erreur">{{ messageErreur }}</p>
  }

  <button type="submit">Se connecter</button>
</form>
