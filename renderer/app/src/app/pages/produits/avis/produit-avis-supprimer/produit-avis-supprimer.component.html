<section class="delete-card">
  <h3>Supprimer cet avis ?</h3>

  <p>Voulez-vous vraiment supprimer l’avis<strong>{{ avis().titre || 'Avis sans titre' }} ?</strong></p>

  @if (avis().commentaire) {
    <p class="commentaire">{{ avis().commentaire }}</p>
  }

  <div class="actions">
    <button type="button" class="delete-button" (click)="confirmerSuppression()">Supprimer</button>
    <button type="button" class="cancel-button" (click)="annulerSuppression()">Annuler</button>
  </div>
</section>
